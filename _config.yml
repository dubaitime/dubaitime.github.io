name: Dubai Time
title: Dubai Time
description: Your Real-Time Guide to Dubai News, Services & Updates
logo: assets/images/idnlogos.png
favicon: assets/images/techico.png
baseurl: ''
url: "https://dubaitime.github.io"
author: Al Khaleej
app_name: "Dubai Time"
app_description: "Your real-time guide to Dubai news, transport, services, and lifestyle - trusted by UAE residents and expats."
default_og_image: "assets/images/hero-cover.jpg"
include:
  - _pages
permalink: '/:title/'
authors:
  dubaitime:
    name: Al Khaleej
    display_name: Al Khaleej
    email: adubaitime@gmail.com
    twitter: ''
    description: "Dubai Time covers practical UAE transport, service, and city-life guides for residents and expats."
    web: "https://dubaitime.github.io"
    gravatar: 77791e95da3e5d3f4e471444fc78bf71
  Al Khaleej:
    name: Al Khaleej
    display_name: Al Khaleej
    email: adubaitime@gmail.com
    twitter: ''
    description: "Al Khaleej is the lead editor at Dubai Time - covering UAE transport, banking, visa services, and city guides for residents and expats."
    scholar: "https://scholar.google.com/citations?hl=en&user=zLa9Up4AAAAJ"
    web: "https://dubaitime.github.io/author/"
    gravatar: 77791e95da3e5d3f4e471444fc78bf71
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true
adsense: 'disabled'
adsense-data-ad-client: 'ca-pub-9071991042477013'
adsense-data-ad-slot: '7908225664'
lazyimages: 'enabled'
collections:
  topics:
    output: true
    permalink: /topics/:slug/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "topics"
    values:
      layout: topic
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
  - scope:
      path: "assets/**/*.pdf"
    values:
      sitemap: false
  - scope:
      path: "sot-simple/tts.html"
    values:
      sitemap: false
      noindex: true

exclude:
  - changelog.md
  - LICENSE.txt
  - README.md
  - Gemfile
  - Gemfile.lock
  - build.log
  - "*.zip"
jekyll_admin:
  hidden_links:
    - datafiles
